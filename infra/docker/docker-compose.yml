version: "3.9"

# -- zklora x punica dev environment ------------------------------------------
#
# Usage:
#   docker compose up -d          # bring up
#   docker compose down           # bring down (preserves volumes)
#   docker compose down -v        # bring down + delete volumes
#   docker compose exec dev bash  # shell into container
#
# Volume mount paths are relative to this file (infra/docker/).
# ../../ = repo root (zklora-punica-mvp/)
# -----------------------------------------------------------------------------

services:

  # -- main dev container ------------------------------------------------------
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: aa-zklora-dev:latest
    container_name: aa-zklora-dev
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTHONPATH=/workspace:/workspace/src:/workspace/zklora/src:/opt/punica:/opt/zkLoRA/src:/opt/zkLoRA
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:-zklora}
    volumes:
      # repo root -- live-mounted, all your code is here
      - ../../:/workspace
      # forked submodules -- overlay /opt so pip editable installs resolve
      - ../../punica:/opt/punica
      - ../../zklora:/opt/zkLoRA
      # model weights -- persisted across container restarts
      - model-weights:/root/.cache/huggingface
      # proof artifacts -- append-only witness logs, proof files
      - proof-artifacts:/artifacts
      # experiment outputs -- measurement results, plots
      - experiment-outputs:/outputs
    ports:
      - "8888:8888" # jupyter
      - "8000:8000" # proof delivery API
    shm_size: "16gb" # needed for pytorch multiprocessing queues
    ulimits:
      memlock: -1
      stack: 67108864
    stdin_open: true
    tty: true
    command: /bin/bash

  # -- jupyter service (optional, separate from main dev shell) ----------------
  jupyter:
    image: aa-zklora-dev:latest
    container_name: zklora-jupyter
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTHONPATH=/workspace:/workspace/src:/workspace/zklora/src:/opt/punica:/opt/zkLoRA/src:/opt/zkLoRA
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:-zklora}
    volumes:
      - ../../:/workspace
      - ../../punica:/opt/punica
      - ../../zklora:/opt/zkLoRA
      - model-weights:/root/.cache/huggingface
      - proof-artifacts:/artifacts
      - experiment-outputs:/outputs
    ports:
      - "8889:8888"
    shm_size: "16gb"
    command: >
      jupyter lab
        --ip=0.0.0.0
        --port=8888
        --no-browser
        --allow-root
        --notebook-dir=/workspace
        --NotebookApp.token=${JUPYTER_TOKEN:-zklora}
    profiles:
      - jupyter # only starts with: docker compose --profile jupyter up

# -- named volumes -------------------------------------------------------------
volumes:
  model-weights:
    driver: local
  proof-artifacts:
    driver: local
  experiment-outputs:
    driver: local
